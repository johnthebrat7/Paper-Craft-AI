version: "3.9"

services:
  # ─── Infrastructure ──────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: vedaai-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: vedaai

  redis:
    image: redis:7.2-alpine
    container_name: vedaai-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --save 20 1 --loglevel warning

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: vedaai-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"   # Management UI at http://localhost:15672 (guest/guest)
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest

  # ─── Backend ─────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vedaai-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - mongodb
      - redis
      - rabbitmq
    environment:
      MONGODB_URI: mongodb://mongodb:27017/vedaai
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
      GEMINI_API_KEY: ${api-key}
      JWT_SECRET: ${JWT_SECRET}
      GEMINI_PROJECT_ID: ${project-id}
      app.frontend.url: http://localhost:3000

  # ─── Frontend ─────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vedaai-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080
      NEXT_PUBLIC_WS_URL: http://localhost:8080/ws

volumes:
  mongo_data:
  rabbitmq_data:
